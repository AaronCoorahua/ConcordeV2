<svg xmlns="http://www.w3.org/2000/svg" width="766" height="120" viewBox="0 0 766 120" fill="none" role="img" aria-label="Banner Centro de ayuda 766x120">
  <defs>
    
    <linearGradient id="bgD" x1="0" y1="44" x2="766" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2A1670"></stop>
      <stop offset="0.48" stop-color="#3D2299"></stop>
      <stop offset="0.72" stop-color="#4A2BB0"></stop>
      <stop offset="1" stop-color="#914559"></stop>
    </linearGradient>
    <linearGradient id="fadeD" x1="0" y1="0" x2="156" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0.5" stop-color="#2A1670" stop-opacity="0"></stop>
      <stop offset="1" stop-color="#2A1670"></stop>
    </linearGradient>
    <pattern id="stripeD" width="14" height="14" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="none"></rect>
      <rect width="7" height="14" fill="#FFFFFF" opacity="0.045"></rect>
    </pattern>
    <clipPath id="roundD"><rect width="766" height="120" rx="16"></rect></clipPath>
  </defs>

  <g clip-path="url(#roundD)">
    <rect width="766" height="120" fill="url(#bgD)"></rect>

    
    <rect x="0" y="0" width="156" height="120" fill="#34208A"></rect>
    <rect x="0" y="0" width="156" height="120" fill="url(#stripeD)"></rect>
    <text x="78" y="60" fill="#FFFFFF" fill-opacity="0.5" font-family="&#39;IBM Plex Mono&#39;, monospace" font-size="11" font-weight="500" letter-spacing="2" text-anchor="middle" dominant-baseline="central">FOTO</text>
    <rect x="0" y="0" width="156" height="120" fill="url(#fadeD)"></rect>

    
    <circle cx="600" cy="6" r="60" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="2" fill="none"></circle>

    
    <text x="178" y="40" fill="#FFFFFF" fill-opacity="0.72" font-size="14" font-weight="600">Visita nuestro</text>
    <text x="178" y="69" fill="#FFFFFF" font-size="27" font-weight="800" letter-spacing="-0.8">Centro de ayuda</text>
    <text x="178" y="92" fill="#FFFFFF" fill-opacity="0.66" font-size="14" font-weight="400">Respuestas rápidas a todas tus dudas</text>

    
    <g>
      <rect x="544" y="32" width="200" height="56" rx="13" fill="#FFFFFF"></rect>
      <text x="562" y="55" fill="#3D2299" font-size="13" font-weight="800" letter-spacing="0.4">IR AL CENTRO</text>
      <text x="562" y="73" fill="#3D2299" font-size="13" font-weight="800" letter-spacing="0.4">DE AYUDA</text>
      <circle cx="713" cy="60" r="13" fill="#E8732A"></circle>
      <text x="713" y="60" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle" dominant-baseline="central">→</text>
    </g>
  </g>
</svg>