<svg xmlns="http://www.w3.org/2000/svg" width="388" height="120" viewBox="0 0 388 120" fill="none" role="img" aria-label="Banner Registro 388x120">
  <defs>
    
    <linearGradient id="rbgm" x1="0" y1="0" x2="388" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2A1670"></stop>
      <stop offset="0.46" stop-color="#3D2299"></stop>
      <stop offset="0.74" stop-color="#4A2BB0"></stop>
      <stop offset="1" stop-color="#C85A1E"></stop>
    </linearGradient>
    <radialGradient id="orbOm" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F08A2B" stop-opacity="0.55"></stop>
      <stop offset="0.68" stop-color="#F08A2B" stop-opacity="0"></stop>
    </radialGradient>
    <filter id="softm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9"></feGaussianBlur>
    </filter>
    <clipPath id="rclipm"><rect width="388" height="120" rx="16"></rect></clipPath>
  </defs>

  <g clip-path="url(#rclipm)">
    <rect width="388" height="120" fill="url(#rbgm)"></rect>
    <circle cx="378" cy="10" r="80" fill="url(#orbOm)" filter="url(#softm)"></circle>

    
    <g>
      <rect x="16" y="18" width="120" height="22" rx="11" fill="#FFFFFF" fill-opacity="0.12" stroke="#FFFFFF" stroke-opacity="0.22"></rect>
      <circle cx="29" cy="29" r="2.5" fill="#FFE2C2"></circle>
      <text x="38" y="29" fill="#FFFFFF" font-size="9.5" font-weight="700" letter-spacing="0.4" dominant-baseline="central">REGISTRO GRATUITO</text>
    </g>

    
    <text x="16" y="68" fill="#FFFFFF" font-size="19" font-weight="800" letter-spacing="-0.6">Únete a la caza de ofertas</text>
    <text x="16" y="92" fill="#FFFFFF" fill-opacity="0.72" font-size="11" font-weight="400">Crea tu cuenta y empieza a enviar tu bid</text>

    
    <g>
      <rect x="296" y="34" width="76" height="52" rx="14" fill="#FFFFFF" fill-opacity="0.12" stroke="#FFFFFF" stroke-opacity="0.22"></rect>
      <text x="334" y="58" fill="#FFFFFF" font-size="22" font-weight="800" letter-spacing="-0.5" text-anchor="middle">+12K</text>
      <text x="334" y="74" fill="#FFFFFF" fill-opacity="0.7" font-size="9" font-weight="600" text-anchor="middle">cazadores</text>
    </g>
  </g>
</svg>