<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>MAX — Banners de sidebar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f0eee9;
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="image-slot.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="sidebar-banners.jsx"></script>
<script type="text/babel">
  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="standalone"
          title="4 formatos · Compra Subaspass · ancho neto 202px"
          subtitle="Mismo contenido del banner Subaspass, adaptado a los 4 formatos del slot. Arrastra tu foto sobre el recuadro para reemplazar el placeholder."
        >
          <DCArtboard id="compacto" label="Compacto · 202×100" width={202} height={100}>
            <SBCompacto />
          </DCArtboard>
          <DCArtboard id="cuadrado" label="Cuadrado · 202×202" width={202} height={202}>
            <SBCuadrado />
          </DCArtboard>
          <DCArtboard id="portrait" label="Portrait · 202×280 ★" width={202} height={280}>
            <SBPortrait />
          </DCArtboard>
          <DCArtboard id="tall" label="Tall · 202×400" width={202} height={400}>
            <SBTall />
          </DCArtboard>
        </DCSection>

        <DCSection
          id="in-context"
          title="En contexto · dentro del sidebar (226px)"
          subtitle="El banner vive bajo la navegación principal, antes del bloque Soporte — zona de descanso visual."
        >
          <DCArtboard id="ctx-compacto" label="Sidebar + Compacto" width={226} height={560}>
            <SidebarMock bannerLabel="Compacto">
              <SBCompacto />
            </SidebarMock>
          </DCArtboard>
          <DCArtboard id="ctx-cuadrado" label="Sidebar + Cuadrado" width={226} height={560}>
            <SidebarMock bannerLabel="Cuadrado">
              <SBCuadrado />
            </SidebarMock>
          </DCArtboard>
          <DCArtboard id="ctx-portrait" label="Sidebar + Portrait ★" width={226} height={620}>
            <SidebarMock bannerLabel="Portrait">
              <SBPortrait />
            </SidebarMock>
          </DCArtboard>
          <DCArtboard id="ctx-tall" label="Sidebar + Tall" width={226} height={720}>
            <SidebarMock bannerLabel="Tall">
              <SBTall />
            </SidebarMock>
          </DCArtboard>
        </DCSection>

        <DCPostIt x={40} y={40}>
          <strong>Specs del slot</strong><br/><br/>
          • Sidebar 226px · padding 12px → banner neto <strong>202px</strong><br/><br/>
          • Borde <code>1px solid rgba(255,255,255,0.14)</code> + radius 10px<br/><br/>
          • Contenido idéntico al banner <strong>Compra Subaspass</strong> de referencia<br/><br/>
          • <strong>Arrastra tu foto</strong> sobre el recuadro para reemplazar el placeholder (se guarda solo).
        </DCPostIt>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
